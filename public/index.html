<!DOCTYPE html>

<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>LM. — LifeClub</title>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500&display=swap" rel="stylesheet" />

  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/ethers/6.7.0/ethers.umd.min.js"></script>

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --cream:   #F0ECE4;
      --cream-d: #E4DFD5;
      --ink:     #111111;
      --ink-mid: #666666;
      --ink-dim: #AAAAAA;
      --red:     #B83232;
      --grid-c:  rgba(0,0,0,0.06);
    }

    html, body {
      height: 100%;
      background: var(--cream);
      color: var(--ink);
      font-family: 'DM Sans', sans-serif;
      overflow: hidden;
      cursor: none;
    }

    /* ── Cursor ── */
    #cursor {
      position: fixed;
      width: 10px; height: 10px;
      border-radius: 50%;
      background: var(--ink);
      pointer-events: none;
      z-index: 9999;
      transform: translate(-50%, -50%);
      transition: width .22s ease, height .22s ease, background .2s, border-radius .2s;
    }
    #cursor.expand {
      width: 34px; height: 34px;
      background: transparent;
      border: 1.5px solid var(--ink);
    }

    /* ── Grid paper ── */
    body::before {
      content: '';
      position: fixed; inset: 0;
      background-image:
        linear-gradient(var(--grid-c) 1px, transparent 1px),
        linear-gradient(90deg, var(--grid-c) 1px, transparent 1px);
      background-size: 30px 30px;
      pointer-events: none;
      z-index: 0;
    }

    /* ── Corner marks ── */
    .corner {
      position: fixed;
      width: 18px; height: 18px;
      opacity: 0;
    }
    .corner::before, .corner::after { content: ''; position: absolute; background: var(--ink); opacity: .2; }
    .corner::before { width: 100%; height: 1px; top: 0; left: 0; }
    .corner::after  { width: 1px; height: 100%; top: 0; left: 0; }
    .corner.tl { top: 36px; left: 36px; }
    .corner.tr { top: 36px; right: 36px; transform: scaleX(-1); }
    .corner.bl { bottom: 36px; left: 36px; transform: scaleY(-1); }
    .corner.br { bottom: 36px; right: 36px; transform: scale(-1); }

    /* ── Network ── */
    .network-badge {
      position: fixed;
      top: 38px; right: 38px;
      display: flex; align-items: center; gap: 7px;
      font-size: 9px; letter-spacing: .2em;
      text-transform: uppercase; color: var(--ink-dim);
      opacity: 0;
    }
    .network-dot { width: 5px; height: 5px; border-radius: 50%; background: #ff9036; box-shadow: 0 0 5px #3aaa68; }

    /* ── Tagline ── */
    .tagline {
      position: fixed;
      bottom: 38px; left: 38px;
      font-family: 'DM Serif Display', serif;
      font-style: italic;
      font-size: 12px;
      color: var(--ink-dim);
      opacity: 0;
      letter-spacing: .01em;
    }

    /* ── Stage ── */
    #stage {
      position: relative;
      z-index: 10;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
      text-align: center;
      padding: 48px;
    }

    /* ── Logo ── */
    .logo-wrap {
      margin-bottom: 52px;
      opacity: 0;
      transform: translateY(16px);
    }
    .logo {
      font-family: 'DM Sans', sans-serif;
      font-weight: 500;
      font-size: clamp(56px, 10vw, 100px);
      letter-spacing: -.025em;
      color: var(--ink);
      line-height: 1;
      display: block;
    }
    .logo-since {
      font-weight: 300;
      font-size: 11px;
      letter-spacing: .22em;
      color: var(--ink-dim);
      text-transform: lowercase;
      margin-top: 8px;
      display: block;
    }

    /* ── Rule ── */
    .rule {
      width: 0;
      height: 1px;
      background: var(--ink);
      opacity: .15;
      margin: 0 auto 40px;
    }

    /* ── Text ── */
    .title-wrap  { overflow: hidden; margin-bottom: 10px; }
    .title {
      font-family: 'DM Serif Display', serif;
      font-style: italic;
      font-weight: 400;
      font-size: clamp(26px, 4vw, 44px);
      color: var(--ink);
      display: block;
      transform: translateY(110%);
      letter-spacing: -.01em;
    }

    .subtitle-wrap { overflow: hidden; margin-bottom: 52px; }
    .subtitle {
      font-weight: 300;
      font-size: 13px;
      letter-spacing: .04em;
      color: var(--ink-mid);
      display: block;
      transform: translateY(110%);
    }

    /* ── Button ── */
    .btn-wrap { opacity: 0; }

    .btn {
      position: relative;
      display: inline-flex;
      align-items: center;
      gap: 12px;
      padding: 15px 44px;
      background: var(--ink);
      border: none;
      color: var(--cream);
      font-family: 'DM Sans', sans-serif;
      font-weight: 400;
      font-size: 11px;
      letter-spacing: .18em;
      text-transform: uppercase;
      cursor: none;
      outline: none;
      overflow: hidden;
    }
    .btn::before {
      content: '';
      position: absolute; inset: 0;
      background: var(--cream-d);
      transform: translateX(-101%);
      transition: transform .42s cubic-bezier(.77,0,.175,1);
    }
    .btn:hover { color: var(--ink); }
    .btn:hover::before { transform: translateX(0); }
    .btn span, .btn svg { position: relative; z-index: 1; transition: color .3s; }

    /* ── Status ── */
    #status-panel {
      position: fixed;
      bottom: 38px; left: 50%;
      transform: translateX(-50%);
      text-align: center;
      opacity: 0; pointer-events: none; z-index: 20;
    }
    .status-label   { font-size: 9px; letter-spacing: .2em; text-transform: uppercase; color: var(--ink-dim); margin-bottom: 3px; }
    .status-address { font-size: 12px; color: var(--ink-mid); }

    /* ── Spinner ── */
    #spinner {
      position: fixed; inset: 0;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center; gap: 20px;
      background: var(--cream);
      z-index: 500; opacity: 0; pointer-events: none;
    }
    .ring {
      width: 40px; height: 40px;
      border: 1.5px solid var(--ink-dim);
      border-top-color: var(--ink);
      border-radius: 50%;
    }
    .spinner-text { font-size: 10px; letter-spacing: .25em; text-transform: uppercase; color: var(--ink-mid); }

    /* ── Result ── */
    #result-overlay {
      position: fixed; inset: 0;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center; gap: 16px;
      background: var(--cream);
      z-index: 600; opacity: 0; pointer-events: none;
    }
    /* grid stays behind */
    #result-overlay::before {
      content: '';
      position: absolute; inset: 0;
      background-image:
        linear-gradient(var(--grid-c) 1px, transparent 1px),
        linear-gradient(90deg, var(--grid-c) 1px, transparent 1px);
      background-size: 30px 30px;
    }
    #result-overlay > * { position: relative; z-index: 1; }

    .result-logo {
      font-family: 'DM Sans', sans-serif;
      font-weight: 500;
      font-size: 40px;
      letter-spacing: -.02em;
      color: var(--ink);
      opacity: 0;
    }
    .result-title {
      font-family: 'DM Serif Display', serif;
      font-style: italic;
      font-size: clamp(30px, 5vw, 52px);
      font-weight: 400;
      letter-spacing: -.01em;
    }
    .result-title.success { color: var(--ink); }
    .result-title.error   { color: var(--red); }
    .result-msg { font-size: 10px; letter-spacing: .2em; text-transform: uppercase; color: var(--ink-dim); }

    /* ── Flash ── */
    .flash-err {
      position: fixed; bottom: 90px; left: 50%;
      transform: translateX(-50%);
      font-size: 10px; letter-spacing: .18em;
      text-transform: uppercase; color: var(--red); z-index: 800;
    }
  </style>

</head>
<body>

    <div class="network-dot"></div>

  <p class="tagline" id="tagline">Doing life together — for real.</p>

  </main>

  <div id="status-panel">
    <p class="status-label">Connected</p>
    <p class="status-address" id="wallet-address-display">—</p>
  </div>

  <div id="spinner">
    <div class="ring" id="ring"></div>
    <p class="spinner-text" id="spinner-text">Verifying</p>
  </div>

  <div id="result-overlay">
    <span class="result-logo" id="result-logo">LM.</span>
    <h2 class="result-title" id="result-title"></h2>
    <p class="result-msg" id="result-msg"></p>
  </div>

  <script>
    /* ── Cursor ── */
    const cursor = document.getElementById('cursor');
    document.addEventListener('mousemove', e => {
      gsap.to(cursor, { x: e.clientX, y: e.clientY, duration: .1, ease: 'power2.out' });
    });
    function expandCursor()  { cursor.classList.add('expand'); }
    function shrinkCursor()  { cursor.classList.remove('expand'); }

    /* ── Entrance timeline ── */
    gsap.timeline({ defaults: { ease: 'power3.out' } })
      .to('.corner',        { opacity: 1, duration: .7, stagger: .08 }, 0.1)
      .to('.network-badge', { opacity: 1, duration: .6 }, 0.4)
      .to('#logo-wrap',     { opacity: 1, y: 0, duration: 1, ease: 'power4.out' }, 0.5)
      .to('#rule',          { width: 140, duration: .9, ease: 'power2.inOut' }, 1.05)
      .to('#title-line',    { y: '0%', duration: .85, ease: 'power4.out' }, 1.2)
      .to('#subtitle-line', { y: '0%', duration: .75, ease: 'power3.out' }, 1.42)
      .to('#btn-wrap',      { opacity: 1, duration: .6 }, 1.68)
      .to('#tagline',       { opacity: 1, duration: .8 }, 1.9);

    /* ── Spin ring ── */
    gsap.to('#ring', { rotation: 360, duration: 1.1, repeat: -1, ease: 'none' });

    /* ── Verify flow ── */
    let isBusy = false;
    const SIGN_IN_MESSAGE = "Welcome to the Club! Please sign this message to verify your wallet ownership.";
    const SERVER_URL = "http://localhost:3000/verify-nft";

    document.getElementById('connect-btn').addEventListener('click', async () => {
      if (isBusy) return;
      if (!window.ethereum) { flashError('No wallet found. Install MetaMask.'); return; }
      isBusy = true;
      await connectAndVerify();
    });

    async function connectAndVerify() {
      try {
        showSpinner('Connecting Wallet');
        const provider = new ethers.BrowserProvider(window.ethereum);
        await provider.send('eth_requestAccounts', []);
        const signer = await provider.getSigner();
        const walletAddress = await signer.getAddress();

        document.getElementById('wallet-address-display').textContent =
          walletAddress.slice(0,6) + '...' + walletAddress.slice(-4);
        gsap.to('#status-panel', { opacity: 1, duration: .4 });

        showSpinner('Sign to Verify');
        const signature = await signer.signMessage(SIGN_IN_MESSAGE);

        showSpinner('Checking Membership');
        const res  = await fetch(SERVER_URL, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ walletAddress, signature })
        });
        const data = await res.json();

        data.authorized ? showSuccess(walletAddress) : showDenied(data.message || 'No access.');

      } catch (err) {
        hideSpinner();
        isBusy = false;
        if (err.code === 4001 || err.code === 'ACTION_REJECTED') {
          flashError('Signature rejected.');
        } else {
          flashError('Something went wrong.');
        }
        console.error(err);
      }
    }

    function showSpinner(msg) {
      document.getElementById('spinner-text').textContent = msg;
      gsap.to('#spinner', { opacity: 1, duration: .28, pointerEvents: 'all' });
    }
    function hideSpinner() {
      gsap.to('#spinner', { opacity: 0, duration: .22, pointerEvents: 'none' });
    }

    function showSuccess(walletAddress) {
      sessionStorage.setItem('verified_wallet', walletAddress);
      hideSpinner();
      const o = document.getElementById('result-overlay');
      document.getElementById('result-title').textContent = 'Welcome in.';
      document.getElementById('result-title').className   = 'result-title success';
      document.getElementById('result-msg').textContent   = 'Redirecting to your dashboard';

      gsap.timeline()
        .to(o,               { opacity: 1, duration: .5, pointerEvents: 'all' })
        .fromTo('#result-logo',
          { opacity: 0, scale: .9 },
          { opacity: 1, scale: 1, duration: .55, ease: 'back.out(1.6)' }, 0.1)
        .fromTo('#result-title',
          { opacity: 0, y: 10 },
          { opacity: 1, y: 0, duration: .45 }, 0.35)
        .fromTo('#result-msg',
          { opacity: 0 },
          { opacity: 1, duration: .4 }, 0.55)
        .call(() => {
          setTimeout(() => {
            gsap.to(o, { opacity: 0, duration: .55,
              onComplete: () => { window.location.href = '/dashboard'; }
            });
          }, 1800);
        });
    }

    function showDenied(msg) {
      hideSpinner();
      const o = document.getElementById('result-overlay');
      document.getElementById('result-logo').style.opacity = '0.18';
      document.getElementById('result-title').textContent = 'Not a member.';
      document.getElementById('result-title').className   = 'result-title error';
      document.getElementById('result-msg').textContent   = msg;

      gsap.timeline()
        .to(o, { opacity: 1, duration: .45, pointerEvents: 'all' })
        .call(() => {
          setTimeout(() => {
            gsap.to(o, { opacity: 0, duration: .45, pointerEvents: 'none',
              onComplete: () => {
                document.getElementById('result-logo').style.opacity = '';
                isBusy = false;
              }
            });
          }, 2600);
        });
    }

    function flashError(msg) {
      const el = document.createElement('div');
      el.className = 'flash-err';
      el.textContent = msg;
      document.body.appendChild(el);
      gsap.fromTo(el, { opacity: 0, y: 6 }, {
        opacity: 1, y: 0, duration: .3,
        onComplete: () => {
          gsap.to(el, { opacity: 0, delay: 2.2, duration: .4, onComplete: () => el.remove() });
        }
      });
    }
  </script>

</body>
</html>
